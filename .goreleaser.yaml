# GoReleaser v2 config — https://goreleaser.com
version: 2

project_name: pb-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: pb
    main: .
    binary: pb
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X pb-cli/cmd.version={{ .Version }}
    # Reproducible builds: pin the binary timestamp to the commit.
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: pb
    ids:
      - pb
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.MD
      - LICENSE

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: git
  sort: asc
  groups:
    - title: Features
      regexp: '(?i)^.*?feat(\(.+\))??!?:.*$'
      order: 0
    - title: Bug fixes
      regexp: '(?i)^.*?fix(\(.+\))??!?:.*$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: skeeeon
    name: pb-cli
  draft: false
  prerelease: auto
